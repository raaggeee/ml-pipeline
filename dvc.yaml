stages:
  data_ingestion:
    cmd: python3 src/data_ingestion.py
    deps:
    - src/data_ingestion.py
    outs:
    - data/raw
  data_preprocessing:
    cmd: python3 src/data_preprocessing.py
    deps:
    - data/raw
    - src/data_preprocessing.py
    outs:
    - data/preprocessed
  feature_engineer:
    cmd: python3 src/feature_engineering.py
    deps:
    - data/preprocessed
    - src/feature_engineering.py
    outs:
    - data/fe
  model:
    cmd: python3 src/model.py
    deps:
    - data/fe
    - src/model.py
    outs:
    - model.pkl
  model_eval:
    cmd: python3 src/model_eval.py
    deps:
    - model.pkl
    - src/model_eval.py
    outs:
    - metrics.json
